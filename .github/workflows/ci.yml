name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ default-jre libantlr4-runtime-dev

    - name: Build project
      run: |
        mkdir build
        cd build
        cmake ..
        cmake --build .

    - name: Run test1.proof
      run: |
        # Ensure the executable name matches your CMakeLists.txt target (assuming 'pearl-proof' here)
        ./build/pearl-proof test1.proof

    - name: Run comprehensive_test.proof
      run: |
        ./build/pearl-proof comprehensive_test.proof
